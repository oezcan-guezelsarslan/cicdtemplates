name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      target-branch:
        required: true
        type: string
    secrets:
      GH_TOKEN:
        required: false

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write


    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.target-branch }}
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      # Dynamische Ermittlung des Image-Namens und des korrekten Tags
      - name: Set Image Name and Dynamic Tag
        run: |
          IMAGE_ID=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_ID=${IMAGE_ID}" >> $GITHUB_ENV
          
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "DOCKER_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "DOCKER_TAG=${{ inputs.target-branch }}" >> $GITHUB_ENV
          fi
          echo "allo Welt"

      - name: Build Docker Image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE_ID }}:${{ env.DOCKER_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_ID }}:${{ env.DOCKER_TAG }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_ID }}:${{ env.DOCKER_TAG }}
